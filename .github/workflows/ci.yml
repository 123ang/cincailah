name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  typecheck-and-build:
    name: TypeCheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/cincailah

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/cincailah
          SESSION_SECRET: ci-secret-min-32-chars-required-for-iron-session
          NEXT_PUBLIC_APP_URL: https://cincailah.com
          RESEND_API_KEY: ''
          EMAIL_FROM: Cincailah <noreply@cincailah.com>
